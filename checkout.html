<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結帳｜心有戚戚焉</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=20260609-5">
  </head>
  <body>
    <header class="product-template-header">
      <a class="brand-mark" href="index.html#/"><object class="brand-logo" data="assets/images/logo-qih.png" type="image/png"><span class="logo-fallback">心有戚戚焉</span></object><span><strong>心有戚戚焉</strong><small>為健康把關</small></span></a>
      <nav class="template-nav"><a href="cart.html">返回購物車</a><a href="login.html">會員登入</a></nav>
    </header>
    <main class="flow-page">
      <section class="flow-hero"><p class="eyebrow">Checkout</p><h1>結帳</h1><p>填寫收件資料，選擇付款與配送方式。</p></section>
      <section class="flow-layout">
        <form class="flow-panel">
          <h2>收件資料</h2>
          <label>姓名<input type="text" placeholder="請輸入姓名"></label>
          <label>電話<input type="tel" placeholder="請輸入電話"></label>
          <label>地址<input type="text" placeholder="請輸入配送地址"></label>
          <label>付款方式<select><option>信用卡</option><option>LINE Pay</option><option>ATM轉帳</option></select></label>
          <label>配送方式<select><option>黑貓宅急便</option><option>超商取貨</option></select></label>
        </form>
        <aside class="flow-summary"><h2>確認付款</h2><p>付款方式：信用卡、LINE Pay、ATM轉帳</p><p>配送方式：黑貓宅急便、超商取貨</p><a class="button primary" href="order-complete.html">送出訂單</a></aside>
      </section>
    </main>
  </body>
</html>
